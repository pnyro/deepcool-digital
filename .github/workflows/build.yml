name: Build

on:
  push:
    branches: [main, windows-support]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: deepcool-digital-linux
          path: target/release/deepcool-digital-linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: deepcool-digital-windows
          path: target/release/deepcool-digital-linux.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mv deepcool-digital-linux/deepcool-digital-linux deepcool-digital-linux-amd64
          mv deepcool-digital-windows/deepcool-digital-linux.exe deepcool-digital-windows-amd64.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            deepcool-digital-linux-amd64
            deepcool-digital-windows-amd64.exe
